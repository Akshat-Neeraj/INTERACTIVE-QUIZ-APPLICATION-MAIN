<!DOCTYPE html>
<html>
<head>
    <title>Quizzer - Home</title>
    <script src="https://kit.fontawesome.com/1fb7c3da32.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="index.css">
    <link rel="icon" href="Logo.png">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Quizzer</a>
            <ul class="nav-list">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="quiz.html">Quiz</a></li>
                <li><a href="result.html">Result</a></li>
                <li><a href="about.html">About Us</a></li>
                <li>
                  <a href="login.html">
                    <button class="signup-btn">Sign Up</button>
                  </a>
                </li>
            </ul>
        </div>
    </nav>

    <section class="main-content">
        <h2>Explore Our Quiz Categories</h2>

        <div class="categories-grid">
            <a href="quiz.html?category=science">
                <div class="category-card">
                    <div class="category-icon"><i class="fas fa-atom"></i></div>
                    <h3>Science</h3>
                    <p class="category-count">20 Questions</p>
                </div>
            </a>

            <a href="quiz.html?category=history">
                <div class="category-card">
                    <div class="category-icon"><i class="fas fa-landmark"></i></div>
                    <h3>History</h3>
                    <p class="category-count">20 Questions</p>
                </div>
            </a>

            <a href="quiz.html?category=movies">
                <div class="category-card">
                    <div class="category-icon"><i class="fas fa-film"></i></div>
                    <h3>Movies</h3>
                    <p class="category-count">20 Questions</p>
                </div>
            </a>

            <a href="quiz.html?category=sports">
                <div class="category-card">
                    <div class="category-icon"><i class="fas fa-running"></i></div>
                    <h3>Sports</h3>
                    <p class="category-count">20 Questions</p>
                </div>
            </a>

            <a href="quiz.html?category=music">
                <div class="category-card">
                    <div class="category-icon"><i class="fas fa-music"></i></div>
                    <h3>Music</h3>
                    <p class="category-count">20 Questions</p>
                </div>
            </a>

            <a href="quiz.html?category=geography">
                <div class="category-card">
                    <div class="category-icon"><i class="fas fa-globe-americas"></i></div>
                    <h3>Geography</h3>
                    <p class="category-count">20 Questions</p>
                </div>
            </a>
        </div>
    </section>

    <footer>
        &copy; 2025 Quizzer. All Rights Reserved
    </footer>

    <script>
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
